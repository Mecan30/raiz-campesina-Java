
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Panel Principal</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-success text-white text-center">
                <h1>Raíz Campesina</h1>
                <h5>Sistema de Comercialización Agrícola</h5>
            </div>

            <div class="card-body">

                <h3 class="mb-4"
                    th:text="'Bienvenido, ' + ${nombreUsuario}">
                    Usuario
                </h3>

                <hr>

                <h4 class="mb-4">Módulos del Sistema</h4>

                <div class="row g-3">

                    <!-- Proveedor -->
                    <div class="col-md-6"
                         th:if="${rolUsuario == 'PROVEEDOR'}">
                        <div class="card border-success shadow-sm">
                            <div class="card-body text-center">
                                <h5>Módulo Proveedor</h5>
                                <a href="/proveedor"
                                   class="btn btn-success">
                                    Ingresar
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Transportador -->
                    <div class="col-md-6"
                         th:if="${rolUsuario == 'TRANSPORTADOR'}">
                        <div class="card border-primary shadow-sm">
                            <div class="card-body text-center">
                                <h5>Módulo Transportador</h5>
                                <a href="/transportador"
                                   class="btn btn-primary">
                                    Ingresar
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Consumidor -->
                    <div class="col-md-6"
                         th:if="${rolUsuario == 'CONSUMIDOR'}">
                        <div class="card border-warning shadow-sm">
                            <div class="card-body text-center">
                                <h5>Módulo Consumidor</h5>
                                <a href="/consumidor"
                                   class="btn btn-warning">
                                    Ingresar
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Administrador -->
                    <div class="col-md-6"
                         th:if="${rolUsuario == 'ADMINISTRADOR'}">
                        <div class="card border-dark shadow-sm">
                            <div class="card-body text-center">
                                <h5>Panel Administrador</h5>
                                <a href="/admin"
                                   class="btn btn-dark">
                                    Ingresar
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="card border-success shadow-sm">
                            <div class="card-body text-center">
                                <h5>Notificaciones</h5>
                                <a href="/notificaciones" class="btn btn-success">
                                    Ingresar
                                </a>
                            </div>
                        </div>
                    </div>

                </div>

                <hr class="mt-4">

                <div class="text-center">
                    <a href="/logout"
                       class="btn btn-danger">
                        Cerrar Sesión
                    </a>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
